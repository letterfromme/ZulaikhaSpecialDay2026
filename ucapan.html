<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Happy Birthday Zulaikha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ucapan.css?v=2.0">
  <style>
    /* Cute and adorable overlay screen with dreamy pastel colors */
    #overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, 
        #ffeef7 0%, 
        #fff0f5 25%,
        #ffe4e9 50%, 
        #fff0f5 75%,
        #ffeef7 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      overflow: hidden;
    }
    
    /* Floating cute hearts background */
    #overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(3px 3px at 15% 25%, rgba(255, 182, 193, 0.8), transparent),
        radial-gradient(4px 4px at 45% 65%, rgba(255, 105, 180, 0.6), transparent),
        radial-gradient(2px 2px at 75% 35%, rgba(255, 192, 203, 0.7), transparent),
        radial-gradient(3px 3px at 30% 80%, rgba(255, 182, 193, 0.6), transparent),
        radial-gradient(4px 4px at 85% 15%, rgba(255, 105, 180, 0.5), transparent),
        radial-gradient(2px 2px at 60% 90%, rgba(255, 192, 203, 0.8), transparent);
      background-size: 250% 250%;
      animation: sparkle 10s ease infinite;
      opacity: 0.7;
    }
    
    /* Floating stars decoration */
    #overlay::after {
      content: "✨";
      position: absolute;
      font-size: 30px;
      animation: floatStars 8s ease-in-out infinite;
      top: 10%;
      left: 15%;
      opacity: 0.6;
    }
    
    @keyframes sparkle {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
    }
    
    @keyframes floatStars {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
      50% { transform: translateY(-30px) rotate(180deg); opacity: 0.8; }
    }
    
    /* Cute decorative elements around button */
    .cute-decoration {
      position: absolute;
      font-size: 40px;
      pointer-events: none;
      z-index: 0;
      animation: bounceAround 3s ease-in-out infinite;
    }
    
    .cute-decoration:nth-child(1) {
      top: -30px;
      left: -40px;
      animation-delay: 0s;
    }
    
    .cute-decoration:nth-child(2) {
      top: -30px;
      right: -40px;
      animation-delay: 0.5s;
    }
    
    .cute-decoration:nth-child(3) {
      bottom: -30px;
      left: -40px;
      animation-delay: 1s;
    }
    
    .cute-decoration:nth-child(4) {
      bottom: -30px;
      right: -40px;
      animation-delay: 1.5s;
    }
    
    @keyframes bounceAround {
      0%, 100% { transform: translateY(0) scale(1); }
      25% { transform: translateY(-15px) scale(1.1); }
      50% { transform: translateY(0) scale(1); }
      75% { transform: translateY(10px) scale(0.9); }
    }
    
    /* Super cute button design */
    #start-btn {
      padding: 25px 60px;
      font-size: 26px;
      font-family: 'Fredoka', cursive;
      border: 4px solid #ffb6c1;
      border-radius: 50px;
      background: linear-gradient(135deg, 
        #ffb6c1 0%, 
        #ff91a4 25%,
        #ff69b4 50%,
        #ff91a4 75%,
        #ffb6c1 100%);
      background-size: 400% 400%;
      color: white;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 
        0 8px 25px rgba(255, 105, 180, 0.4),
        0 0 50px rgba(255, 182, 193, 0.5),
        inset 0 3px 15px rgba(255, 255, 255, 0.5),
        inset 0 -3px 10px rgba(255, 105, 180, 0.2);
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      position: relative;
      z-index: 1;
      animation: gradient-shift 4s ease infinite, cuteBounce 2.5s ease-in-out infinite;
      text-shadow: 
        2px 2px 4px rgba(255, 105, 180, 0.5),
        0 0 10px rgba(255, 255, 255, 0.8);
      letter-spacing: 1px;
    }
    
    /* Shine effect on button */
    #start-btn::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, 
        transparent 30%, 
        rgba(255, 255, 255, 0.3) 50%, 
        transparent 70%);
      animation: shine 3s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes shine {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }
    
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    @keyframes cuteBounce {
      0%, 100% { transform: scale(1) translateY(0); }
      25% { transform: scale(1.08) translateY(-8px); }
      50% { transform: scale(1.05) translateY(-5px); }
      75% { transform: scale(1.08) translateY(-8px); }
    }
    
    #start-btn:hover {
      transform: scale(1.15) translateY(-5px) rotate(3deg);
      box-shadow: 
        0 12px 35px rgba(255, 105, 180, 0.6),
        0 0 70px rgba(255, 182, 193, 0.7),
        inset 0 4px 20px rgba(255, 255, 255, 0.6),
        inset 0 -4px 15px rgba(255, 105, 180, 0.3);
      border-color: #ff69b4;
    }
    
    #start-btn:active {
      transform: scale(1.05) translateY(-2px) rotate(-2deg);
      box-shadow: 
        0 4px 15px rgba(255, 105, 180, 0.5),
        inset 0 2px 10px rgba(255, 255, 255, 0.4);
    }
    
    /* Cute hint text with more style */
    .hint-text {
      margin-top: 40px;
      color: #ff69b4;
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 500;
      opacity: 0.9;
      animation: fadeInOut 2.5s ease-in-out infinite;
      text-align: center;
      text-shadow: 
        0 2px 8px rgba(255, 182, 193, 0.6),
        0 0 15px rgba(255, 105, 180, 0.4);
      letter-spacing: 0.5px;
    }
    
    @keyframes fadeInOut {
      0%, 100% { opacity: 0.6; transform: translateY(0) scale(1); }
      50% { opacity: 1; transform: translateY(-8px) scale(1.05); }
    }
    
    /* Floating hearts animation */
    .floating-heart {
      position: absolute;
      font-size: 30px;
      pointer-events: none;
      animation: floatHeart 4s ease-in-out infinite;
      opacity: 0.7;
    }
    
    @keyframes floatHeart {
      0% { 
        transform: translateY(100vh) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { 
        transform: translateY(-100px) translateX(50px) rotate(360deg);
        opacity: 0;
      }
    }
    
    /* Responsive adjustments for mobile */
    @media screen and (max-width: 768px) {
      #start-btn {
        padding: 20px 40px;
        font-size: 20px;
        border-radius: 40px;
      }
      
      .hint-text {
        font-size: 16px;
        margin-top: 30px;
      }
      
      .cute-decoration {
        font-size: 30px;
      }
      
      .cute-decoration:nth-child(1) {
        top: -25px;
        left: -30px;
      }
      
      .cute-decoration:nth-child(2) {
        top: -25px;
        right: -30px;
      }
      
      .cute-decoration:nth-child(3) {
        bottom: -25px;
        left: -30px;
      }
      
      .cute-decoration:nth-child(4) {
        bottom: -25px;
        right: -30px;
      }
    }
    
    @media screen and (max-width: 480px) {
      #start-btn {
        padding: 18px 35px;
        font-size: 18px;
        border-radius: 35px;
      }
      
      .hint-text {
        font-size: 14px;
        margin-top: 25px;
      }
      
      .cute-decoration {
        font-size: 25px;
      }
    }
    
    .flowers-wrapper {
      display: none;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    .flowers-wrapper.show {
      display: flex;
      opacity: 1;
    }
    
    /* Confetti container */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- Cute and adorable overlay with button -->
  <div id="overlay">
    <div class="confetti-container" id="confettiContainer"></div>
    <div class="cute-decoration">🌸</div>
    <div class="cute-decoration">💕</div>
    <div class="cute-decoration">✨</div>
    <div class="cute-decoration">🎀</div>
    <button id="start-btn">💝 SELAMAT HARI ULANG TAHUN ZULAIKHA 💝</button>
    <div class="hint-text">✨ Tekan butang untuk mula! ✨</div>
  </div>

  <!-- Birthday card -->
  <div class="flowers-wrapper">
    <div class="hearts" aria-hidden="true"></div>
    <div class="sparkles" aria-hidden="true"></div>
    <div class="card">
      <div class="card-decoration-top"></div>
      <h1><span class="script">Selamat Ulang Tahun</span> <span class="name-glow">Zulaikha</span></h1>
      <p id="message"></p>
      <div id="signature" class="signature" aria-hidden="true">— Iqbal</div>
      <div class="card-decoration-bottom"></div>
    </div>
  </div>

  <script src="ucapan.js?v=2.0"></script>
  <script>
    // simpan semua sound dalam satu object (boleh tambah lain kalau nak)
    const SOUNDS = {
      SONG: new Audio("HappyBirthdayAiqhaSong.mp3"),
    };

    // setting untuk background song
    SOUNDS.SONG.loop = true;
    SOUNDS.SONG.volume = 0.7;

    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("start-btn");
    const wrapper = document.querySelector(".flowers-wrapper");
    const confettiContainer = document.getElementById("confettiContainer");
    
    // Create floating hearts for extra cuteness
    function createFloatingHearts() {
      const hearts = ['💕', '💖', '💗', '💝', '💓', '💞'];
      setInterval(() => {
        if (overlay.style.display !== 'none') {
          const heart = document.createElement('div');
          heart.className = 'floating-heart';
          heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          heart.style.left = Math.random() * 100 + '%';
          heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
          heart.style.animationDelay = Math.random() * 1 + 's';
          overlay.appendChild(heart);
          
          setTimeout(() => {
            heart.remove();
          }, 5000);
        }
      }, 800);
    }
    
    // Start floating hearts
    createFloatingHearts();

    // Create confetti explosion
    function createConfetti() {
      const colors = ['#ff69b4', '#ffb6c1', '#ff4081', '#ff9100', '#fff', '#ffd700'];
      const confettiCount = 50;
      
      for (let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement('div');
        confetti.style.position = 'absolute';
        confetti.style.width = Math.random() * 10 + 5 + 'px';
        confetti.style.height = confetti.style.width;
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.top = Math.random() * 100 + '%';
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        confetti.style.opacity = Math.random() * 0.8 + 0.2;
        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        confetti.style.animation = `confettiFall ${Math.random() * 2 + 2}s ease-out forwards`;
        confettiContainer.appendChild(confetti);
        
        setTimeout(() => confetti.remove(), 3000);
      }
    }

    startBtn.addEventListener("click", () => {
      // Create confetti explosion
      createConfetti();
      
      // Hide overlay with fade
      overlay.style.transition = 'opacity 0.8s ease';
      overlay.style.opacity = '0';
      
      setTimeout(() => {
        overlay.style.display = "none";
      }, 800);

      // Show wrapper with fade-in
      wrapper.classList.add("show");

      // Play background song
      SOUNDS.SONG.play().catch(err => {
        console.log("Autoplay blocked:", err);
      });
    });
    
    // Add confetti fall animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes confettiFall {
        to {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
