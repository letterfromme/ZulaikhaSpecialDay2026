<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="Selamat Ulang Tahun Zulaikha! A special birthday celebration with animations and heartfelt message.">
  <title>🎀 Selamat Ulang Tahun Zulaikha 🎀</title>
  
  <!-- Preload critical fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Critical CSS inline for faster first paint -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Fredoka', 'Poppins', sans-serif; overflow: hidden; }
    #overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #ffeef7, #fff0f5, #ffe4e9, #fff0f5, #ffeef7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    #start-btn { padding: 25px 60px; font-size: 26px; font-family: 'Fredoka', cursive; border: 4px solid #ffb6c1; border-radius: 50px; background: linear-gradient(135deg, #ffb6c1, #ff91a4, #ff69b4, #ff91a4, #ffb6c1); color: white; cursor: pointer; font-weight: 600; box-shadow: 0 8px 25px rgba(255,105,180,0.4); transition: all 0.3s ease; position: relative; z-index: 1; animation: cuteBounce 2.5s ease-in-out infinite; }
    @keyframes cuteBounce { 0%, 100% { transform: scale(1) translateY(0); } 25% { transform: scale(1.08) translateY(-8px); } 50% { transform: scale(1.05) translateY(-5px); } 75% { transform: scale(1.08) translateY(-8px); } }
  </style>
  
  <!-- Defer non-critical CSS -->
  <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css"></noscript>
</head>
<body>
  <!-- Overlay with button -->
  <div id="overlay">
    <div class="confetti-container" id="confettiContainer"></div>
    <div style="font-size: 40px; animation: bounce 2s infinite;">🌸</div>
    <div style="font-size: 40px; animation: bounce 2s 0.3s infinite;">💕</div>
    <div style="font-size: 40px; animation: bounce 2s 0.6s infinite;">✨</div>
    <div style="font-size: 40px; animation: bounce 2s 0.9s infinite;">🎀</div>
    <button id="start-btn">💝 SELAMAT HARI ULANG TAHUN ZULAIKHA 💝</button>
    <div style="margin-top: 40px; color: #ff69b4; font-size: 18px; font-weight: 500;">✨ Tekan butang untuk mula! ✨</div>
  </div>

  <!-- Birthday card (hidden initially) -->
  <div class="flowers-wrapper" style="display: none;">
    <div style="text-align: center; color: #2d2d2d;">
      <h1 style="font-size: 2.2rem; margin-bottom: 30px;">
        <span style="font-family: 'Great Vibes', cursive; font-size: 2.8rem; display: block;">Selamat Ulang Tahun</span>
        <span style="background: linear-gradient(135deg, #fff, #ffb6c1, #ff69b4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;">Zulaikha</span>
      </h1>
      <div id="message" style="color: #1a1a1a; font-size: 1.3rem; line-height: 2.2; white-space: pre-line; text-align: left; padding: 40px; background: rgba(255,255,255,0.95); border-radius: 25px; border: 3px solid rgba(255,182,193,0.4); min-height: 200px; max-width: 800px; margin: 25px auto;"></div>
      <div id="signature" style="margin-top: 30px; color: #8b4a6b; font-family: 'Great Vibes', cursive; font-size: 2.2rem; text-align: right; padding-right: 25px;">— Iqbal</div>
    </div>
  </div>

  <!-- Scripts with defer for better loading -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.2.6/gsap.min.js" defer></script>
  <script src="https://unpkg.com/splitting/dist/splitting.min.js" defer></script>
  <script src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/16327/MorphSVGPlugin3.min.js" defer></script>
  
  <!-- Audio setup (non-blocking, no autoplay) -->
  <script>
    const SOUNDS = {
      SONG: new Audio("HappyBirthdayAiqhaSong.mp3"),
    };
    SOUNDS.SONG.loop = true;
    SOUNDS.SONG.volume = 0.7;
    SOUNDS.SONG.preload = "none"; // Don't load until needed
  </script>
  
  <!-- Main app script (deferred) -->
  <script defer>
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("start-btn");
    const wrapper = document.querySelector(".flowers-wrapper");
    const confettiContainer = document.getElementById("confettiContainer");
    
    function createFloatingHearts() {
      const hearts = ['💕', '💖', '💗', '💝', '💓', '💞'];
      setInterval(() => {
        if (overlay.style.display !== 'none') {
          const heart = document.createElement('div');
          heart.style.position = 'absolute';
          heart.style.fontSize = '30px';
          heart.style.left = Math.random() * 100 + '%';
          heart.style.top = '-50px';
          heart.style.animation = 'floatUp 4s ease-in-out forwards';
          heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          overlay.appendChild(heart);
          setTimeout(() => heart.remove(), 4000);
        }
      }, 800);
    }
    
    function createConfetti() {
      const colors = ['#ff69b4', '#ffb6c1', '#ff4081', '#ff9100', '#fff', '#ffd700'];
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.style.position = 'absolute';
        confetti.style.width = Math.random() * 10 + 5 + 'px';
        confetti.style.height = confetti.style.width;
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.top = Math.random() * 100 + '%';
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        confetti.style.animation = `confettiFall ${Math.random() * 2 + 2}s ease-out forwards`;
        confettiContainer.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }
    }
    
    startBtn.addEventListener("click", () => {
      createConfetti();
      overlay.style.transition = 'opacity 0.8s ease';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = "none", 800);
      wrapper.style.display = "flex";
      wrapper.style.opacity = "0";
      setTimeout(() => wrapper.style.opacity = "1", 50);
      SOUNDS.SONG.play().catch(err => console.log("Autoplay blocked"));
      
      // Type message
      const message = `ASSALAMUALAIKUM WAHAI SAUDARI ZULAIKHA,

Alhamdulillah, syukur atas nikmat kurniaan Tuhan. Di kala hidup mendatangkan seribu satu keperitan dan dugaan, saudari tetap teguh berdiri, dan akhirnya tiba di hari yang dinanti penuh makna ini.

Selamat Ulang Tahun yang ke-20, Zulaikha!

Ikhlas dari hati,
Iqbal`;
      
      const msgContainer = document.getElementById("message");
      let i = 0;
      function typeWriter() {
        if (i < message.length) {
          msgContainer.textContent += message.charAt(i++);
          setTimeout(typeWriter, 40);
        }
      }
      setTimeout(typeWriter, 1000);
    });
    
    createFloatingHearts();
    
    // Add animations
    const style = document.createElement('style');
    style.textContent = `
      @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }
      @keyframes confettiFall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
      .flowers-wrapper { transition: opacity 0.8s ease; }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
