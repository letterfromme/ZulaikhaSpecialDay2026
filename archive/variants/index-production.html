  <!-- Main overlay -->

    <div style="font-size:40px;animation:bounce 2s infinite">🌸</div>

    <div style="font-size:40px;animation:bounce 2s 0.6s infinite">✨</div>
    <div style="font-size:40px;animation:bounce 2s 0.9s infinite">🎀</div>
    <button id="start-btn" aria-label="Start birthday celebration">💝 SELAMAT HARI ULANG TAHUN ZULAIKHA 💝</button>

  <script src="https://unpkg.com/splitting/dist/splitting.min.js" defer integrity="sha384-kbGaC+yC0JJQRZSbRwC2S7YiAcq5N/bQevNm7pGGKSdPRvx2w7FBWYgHPBJiPqX6T" crossorigin="anonymous"></script>
  
  <!-- Main app logic (optimized and minified) -->
  <script defer>
